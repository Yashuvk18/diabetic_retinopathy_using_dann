<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Login - RetinaCare DANN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="ambient"></div>
    <main class="auth-page">
      <section class="auth-card">
        <p class="eyebrow">Protected Access</p>
        <h1>Doctor Login</h1>
        <p class="subtext">Sign in to access prediction history and admin dashboard.</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login', next=next_url) }}" class="auth-form">
          <label>
            Username
            <input type="text" name="username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" required />
          </label>
          <button class="pill-btn full" type="submit">Login</button>
        </form>

        <a class="text-link" href="{{ url_for('index') }}">Back to screening interface</a>
      </section>
    </main>
  </body>
</html>
